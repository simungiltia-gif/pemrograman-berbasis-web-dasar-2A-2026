<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen flex">

  <div class="w-1/2 bg-[#5B73B4] text-white flex flex-col justify-center items-center px-16">
    
    <h1 class="text-4xl font-bold mb-6 text-center leading-snug">
      Hello Prospective <br> Students
    </h1>

    <img src="ASSET (1)/UTS/gambar_login page.png" alt="login pge" class="w-72 mb-6">

    <p class="text-center text-sm max-w-md">
      Unlock your professional potential. Learn from industry leaders 
      and stay ahead of the competition.
    </p>
  </div>

  <div class="w-1/2 bg-gray-200 flex justify-center items-center">
    
    <div class="w-80">
      
      <h2 class="text-center font-bold text-gray-700 mb-1">
        LOGIN PAGE
      </h2>
      <p class="text-center text-xs text-gray-500 mb-6">
        Masukkan Username dan Password Anda
      </p>

      <form id="loginForm">
        <input id="email" type="text" placeholder="Email Address"
          class="w-full mb-2 px-4 py-2 rounded-lg border text-center shadow focus:outline-none placeholder-[#3852B4]">
        
        <p id="emailError" class="text-red-500 text-xs mb-2 hidden"></p>

        <input id="password" type="password" placeholder="Password"
          class="w-full text-center shadow mb-2 px-4 py-2 rounded-lg border focus:outline-none placeholder-[#3852B4]">
        
        <p id="passwordError" class="text-red-500 text-xs mb-2 hidden"></p>

        <button type="submit" class="w-full bg-[#3852B4] text-white py-2 rounded-lg shadow mb-4">
          Login
        </button>
      </form>

      <div class="flex items-center mb-4">
        <div class="flex-1 h-px bg-gray-400"></div>
        <p class="mx-2 text-xs text-gray-400">Or Login With</p>
        <div class="flex-1 h-px bg-gray-400"></div>
      </div>

      <button class="w-full bg-white border py-2 rounded flex items-center justify-center gap-2 shadow">
        <img src="ASSET (1)/UTS/google.png" alt="google" class="w-5">
        <span class="text-sm">Sign in with Account Google</span>
      </button>

    </div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const email = document.getElementById("email");
    const password = document.getElementById("password");

    const emailError = document.getElementById("emailError");
    const passwordError = document.getElementById("passwordError");

    form.addEventListener("submit", function(e) {
      e.preventDefault(); 
      let valid = true;

      emailError.classList.add("hidden");
      passwordError.classList.add("hidden");

      if (email.value.trim() === "") {
        emailError.textContent = "Email tidak boleh kosong!";
        emailError.classList.remove("hidden");
        valid = false;
      } else if (!email.value.includes("@")) {
        emailError.textContent = "Format email tidak valid!";
        emailError.classList.remove("hidden");
        valid = false;
      }

      if (password.value.trim() === "") {
        passwordError.textContent = "Password tidak boleh kosong!";
        passwordError.classList.remove("hidden");
        valid = false;
      } else if (password.value.length < 6) {
        passwordError.textContent = "Password minimal 6 karakter!";
        passwordError.classList.remove("hidden");
        valid = false;
      }

      if (valid) {
        alert("Login berhasil!");
      }
    });
  </script>

</body>
</html>
